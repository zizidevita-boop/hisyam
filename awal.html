<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portofolio - Mohammad Yusuf Hisyam</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Orbitron:wght@500;700&display=swap"
    rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(-45deg, #0f172a, #020617, #0f172a, #001f3f);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
    }

    @keyframes bgMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* ===== PARTICLE BACKGROUND ===== */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .particles span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #00f2ff;
      border-radius: 50%;
      animation: float 10s linear infinite;
      opacity: 0.7;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0);
      }

      100% {
        transform: translateY(-10vh) scale(1);
      }
    }

    /* ===== CONTAINER ===== */
    .container {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(0, 242, 255, 0.3);
      z-index: 2;
    }

    /* ===== CIRCLE ANIMATION ===== */
    .container span {
      position: absolute;
      left: 0;
      width: 30px;
      height: 6px;
      background: #1e293b;
      border-radius: 8px;
      transform-origin: 160px;
      transform: rotate(calc(var(--i) * (360deg / 50)));
      animation: animate 3s linear infinite;
      animation-delay: calc(var(--i) * (3s / 50));
    }

    @keyframes animate {
      0% {
        background: #00f2ff;
      }

      50% {
        background: #1e293b;
      }

      100% {
        background: #00f2ff;
      }
    }

    /* ===== TEXT ===== */
    .text-box {
      position: absolute;
      text-align: center;
      z-index: 5;
    }

    .text-box h1 {
      font-family: "Orbitron", sans-serif;
      font-size: 19px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #00f2ff, #38bdf8, #00f2ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: textMove 3s linear infinite;
      text-shadow: 0 0 20px #00f2ff;
    }

    @keyframes textMove {
      0% {
        background-position: 0%;
      }

      100% {
        background-position: 200%;
      }
    }

    .text-box h2 {
      font-size: 18px;
      margin-top: 10px;
      color: #e2e8f0;
      opacity: 0;
      animation: fadeSlide 2s ease forwards;
      animation-delay: 0.5s;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== BUTTON ===== */
    .btn {
      margin-top: 20px;
      padding: 10px 30px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, #00f2ff, #38bdf8);
      color: #0f172a;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px #00f2ff;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 35px #00f2ff;
    }
  </style>
</head>

<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="text-box">
      <h1 class="zoom-out">Welcome My Guys</h1>
      <h2 class="zoom-out">My Portfolio</h2>
      <button type="button" class="btn" onclick="window.location.href = 'index.html'">
        Start
      </button>
    </div>

    <script>
      // Circle animation
      for (let i = 0; i < 50; i++) {
        let span = document.createElement("span");
        span.style.setProperty("--i", i);
        document.querySelector(".container").appendChild(span);
      }

      // Particle effect
      const particles = document.getElementById("particles");
      for (let i = 0; i < 60; i++) {
        let star = document.createElement("span");
        star.style.left = Math.random() * 100 + "%";
        star.style.animationDuration = 5 + Math.random() * 10 + "s";
        star.style.animationDelay = Math.random() * 5 + "s";
        particles.appendChild(star);
      }
    </script>
  </div>
</body>
</html>
